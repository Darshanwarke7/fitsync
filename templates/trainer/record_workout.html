{% extends "base.html" %}
{% block title %}Record Workout{% endblock %}
{% block page_title %}Record Workout Session{% endblock %}
{% block page_sub %}Log sets, reps, and weight for a member's session{% endblock %}

{% block content %}
<div class="panel">
  <form method="POST" action="{{ url_for('trainer.record_workout') }}">
    <div class="row g-2 mb-3">
      <div class="col-md-4">
        <label class="form-label">Member</label>
        <select class="form-select" name="member_id" required>
          <option value="">Select member...</option>
          {% for m in members %}<option value="{{ m.member_id }}">{{ m.full_name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-3"><label class="form-label">Date</label><input type="date" class="form-control" name="session_date" required></div>
      <div class="col-md-5"><label class="form-label">Session Title</label><input class="form-control" name="title" placeholder="e.g. Chest & Triceps"></div>
    </div>

    <label class="form-label">Exercises</label>
    <div id="exercise-rows">
      <div class="row g-2 align-items-center mb-2 exercise-row">
        <div class="col-md-3">
          <select name="muscle_group[]" class="form-select form-select-sm" required>
            <option value="Chest">Chest</option><option value="Back">Back</option><option value="Legs">Legs</option>
            <option value="Shoulders">Shoulders</option><option value="Arms">Arms</option><option value="Core">Core</option>
            <option value="Cardio">Cardio</option><option value="Full Body">Full Body</option>
          </select>
        </div>
        <div class="col-md-3"><input type="text" name="exercise_name[]" class="form-control form-control-sm" placeholder="Exercise name" required></div>
        <div class="col-md-1"><input type="number" name="sets[]" class="form-control form-control-sm" placeholder="Sets"></div>
        <div class="col-md-1"><input type="number" name="reps[]" class="form-control form-control-sm" placeholder="Reps"></div>
        <div class="col-md-1"><input type="number" step="0.5" name="weight_kg[]" class="form-control form-control-sm" placeholder="Kg"></div>
        <div class="col-md-2"><input type="number" name="duration_min[]" class="form-control form-control-sm" placeholder="Min"></div>
        <div class="col-md-1"></div>
      </div>
    </div>
    <button type="button" class="btn btn-sm btn-outline-brand mb-3" onclick="addExerciseRow()"><i class="bi bi-plus-lg"></i> Add Exercise</button>

    <div class="mb-3">
      <label class="form-label">Trainer Notes</label>
      <textarea class="form-control" name="trainer_notes" rows="2" placeholder="Form cues, observations, adjustments..."></textarea>
    </div>

    <button class="btn btn-brand">Save Session</button>
  </form>
</div>
{% endblock %}
